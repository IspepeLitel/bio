<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISPEPELITEL | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Comfortaa:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-image: url('https://i.pinimg.com/736x/ef/3f/a4/ef3fa48094cd63e690d1277fc2c772f4.jpg');
            --blood-red: #ff3333;
            --dark-panel: rgba(25, 20, 20, 0.85);
            --neon-glow: 0 0 12px rgba(255, 51, 51, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(15, 0, 0, 0.9)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Comfortaa', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 460px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Блок аватара с пентаграммой */
        .avatar-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3a1010;
            box-shadow: inset 0 0 20px #000, var(--neon-glow);
            z-index: 2;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-dot {
            position: absolute;
            bottom: 66px;
            right: 66px;
            width: 24px;
            height: 24px;
            background: #22c55e;
            border-radius: 50%;
            border: 4px solid #191414;
            box-shadow: 0 0 10px #22c55e;
            z-index: 3;
        }

        /* SVG пентаграмма */
        .pentagram-svg {
            position: absolute;
            width: 240px;
            height: 240px;
            z-index: 1;
            filter: drop-shadow(0 0 6px rgba(255, 51, 51, 0.4));
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* Свечение за авой */
        .pentagram-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.25) 0%, rgba(0, 243, 255, 0.03) 60%, transparent 80%);
            filter: blur(15px);
            z-index: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ring, .star-lines {
            fill: none;
            stroke: var(--blood-red);
            stroke-width: 1.5;
            transform-origin: center;
        }

        .outer-ring {
            stroke-width: 2;
            opacity: 0.8;
        }

        .outer-ring-dashed {
            stroke: #00f3ff;
            opacity: 0.6;
            animation: rotateClockwise 25s linear infinite;
        }

        .star-lines {
            stroke-width: 1.5;
            opacity: 0.7;
            animation: rotateCounterClockwise 35s linear infinite;
        }

        .core-dot {
            fill: #00f3ff;
            animation: pulseCore 2s infinite ease-in-out;
            transform-origin: center;
        }

        /* Эффект наведения БЕЗ лагов и сброса анимации */
        .avatar-container:hover .pentagram-svg {
            filter: drop-shadow(0 0 22px rgba(255, 51, 51, 0.95));
            transform: scale(1.05);
        }

        .avatar-container:hover .star-lines {
            stroke: #ff1a1a;
            opacity: 1;
        }

        .avatar-container:hover .outer-ring-dashed {
            stroke: #ff1a1a;
            opacity: 0.9;
        }

        .avatar-container:hover .pentagram-glow {
            background: radial-gradient(circle, rgba(255, 51, 51, 0.5) 0%, rgba(255, 51, 51, 0.15) 50%, transparent 70%);
        }

        .avatar-container:hover .avatar {
            border-color: #ff3333;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8);
            transform: scale(1.02);
        }

        /* Карточка аккаунтов */
        .intro-card {
            background: var(--dark-panel);
            border: 1px solid rgba(255, 51, 51, 0.15);
            border-radius: 20px;
            padding: 22px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            margin-bottom: 20px;
        }

        .intro-title {
            font-size: 1.1rem;
            margin-bottom: 18px;
            letter-spacing: 1px;
            color: #f3f4f6;
        }

        .social-icons-row {
            display: flex;
            justify-content: center;
            gap: 22px; /* Чуть уменьшил отступ, чтобы 5 иконок встали идеально ровно */
            margin-bottom: 14px;
        }

        .icon-link {
            color: #a3a3a3;
            font-size: 1.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .icon-link:hover {
            color: var(--blood-red);
            transform: scale(1.2);
            text-shadow: var(--neon-glow);
        }

        .intro-footer {
            font-size: 0.8rem;
            color: #888;
        }

        /* Ник и теги */
        .nickname {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.9rem;
            color: #fff;
            text-shadow: 0 0 8px var(--blood-red), 0 0 15px rgba(255,0,0,0.5);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tags-row {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        .tag-badge {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Карточка БИО */
        .info-card {
            background: rgba(15, 10, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            text-align: left;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #eee;
            font-weight: bold;
        }

        /* Кнопка ПК и спойлер */
        .pc-toggle-btn {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid rgba(255, 51, 51, 0.3);
            color: #fff;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .pc-toggle-btn:hover {
            background: var(--blood-red);
            box-shadow: var(--neon-glow);
            border-color: var(--blood-red);
        }

        .pc-spec-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            width: 100%;
            text-align: left;
            background: rgba(20, 5, 5, 0.5);
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .pc-spec-panel.open {
            max-height: 300px;
            border: 1px solid rgba(255, 51, 51, 0.15);
            padding: 15px 20px;
        }

        /* Цитата */
        .hellsing-quote {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.85rem;
            line-height: 1.7;
            color: #d1d5db;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255, 51, 51, 0.2);
            padding-top: 20px;
            width: 100%;
        }

        /* Анимации */
        @keyframes rotateClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateCounterClockwise {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes pulseCore {
            0%, 100% { transform: scale(1); fill: #00f3ff; }
            50% { transform: scale(1.1); fill: #ff3333; }
        }
    </style>
</head>
<body>
